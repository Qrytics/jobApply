<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jobApply</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="6" width="20" height="14" rx="2" fill="#4f46e5"/>
        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="#4f46e5" stroke-width="2"/>
        <line x1="8" y1="12" x2="16" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="15" x2="14" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>jobApply</h1>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="profile">Profile</button>
    <button class="tab-btn" data-tab="rules">Rules</button>
  </div>

  <!-- Profile Tab -->
  <div id="tab-profile" class="tab-content active">
    <form id="profile-form">
      <div class="section-title">Personal Information</div>

      <div class="form-row two-col">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="Jane" />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="jane@example.com" />
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" placeholder="+1 (555) 000-0000" />
      </div>

      <div class="form-group">
        <label for="address">Street Address</label>
        <input type="text" id="address" placeholder="123 Main St" />
      </div>

      <div class="form-row three-col">
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" placeholder="Springfield" />
        </div>
        <div class="form-group">
          <label for="state">State</label>
          <input type="text" id="state" placeholder="IL" />
        </div>
        <div class="form-group">
          <label for="zipCode">ZIP</label>
          <input type="text" id="zipCode" placeholder="62701" />
        </div>
      </div>

      <div class="section-title">Professional</div>

      <div class="form-group">
        <label for="jobTitle">Current / Desired Job Title</label>
        <input type="text" id="jobTitle" placeholder="Software Engineer" />
      </div>

      <div class="form-group">
        <label for="company">Current Company</label>
        <input type="text" id="company" placeholder="Acme Corp" />
      </div>

      <div class="form-group">
        <label for="yearsExp">Years of Experience</label>
        <input type="text" id="yearsExp" placeholder="5" />
      </div>

      <div class="form-group">
        <label for="salary">Expected Salary</label>
        <input type="text" id="salary" placeholder="$80,000" />
      </div>

      <div class="section-title">Online Presence</div>

      <div class="form-group">
        <label for="linkedin">LinkedIn URL</label>
        <input type="url" id="linkedin" placeholder="https://linkedin.com/in/janedoe" />
      </div>

      <div class="form-group">
        <label for="github">GitHub URL</label>
        <input type="url" id="github" placeholder="https://github.com/janedoe" />
      </div>

      <div class="form-group">
        <label for="website">Portfolio / Website</label>
        <input type="url" id="website" placeholder="https://janedoe.dev" />
      </div>

      <div class="section-title">Cover Letter</div>

      <div class="form-group">
        <label for="coverLetter">Cover Letter Template</label>
        <textarea id="coverLetter" rows="5" placeholder="Dear Hiring Manager, ..."></textarea>
      </div>

      <div class="section-title">Work Experience</div>
      <div id="experiences-list" class="repeatable-list"></div>
      <button type="button" class="btn-add-item" id="add-experience">+ Add Experience</button>

      <div class="section-title">Projects</div>
      <div id="projects-list" class="repeatable-list"></div>
      <button type="button" class="btn-add-item" id="add-project">+ Add Project</button>

      <div class="section-title">Skills</div>
      <div class="form-group">
        <label for="skill-input">Skills <span class="field-hint">(press Enter or comma to add)</span></label>
        <div id="skills-tags" class="tags-container"></div>
        <input type="text" id="skill-input" placeholder="e.g. JavaScript, Python, React…" autocomplete="off" />
      </div>

      <button type="submit" class="btn-save" id="save-profile">Save Profile</button>
      <div id="save-status" class="save-status"></div>
    </form>
  </div>

  <!-- Rules Tab -->
  <div id="tab-rules" class="tab-content">
    <p class="rules-intro">
      Add custom keyword rules. When a field label or placeholder on the page matches
      a keyword, jobApply will fill it with the value you provide.
    </p>

    <div class="rules-list" id="rules-list">
      <!-- Rules rendered here by JS -->
    </div>

    <button class="btn-add-rule" id="add-rule-btn">+ Add Rule</button>

    <!-- Add / Edit Rule Modal -->
    <div class="modal-overlay hidden" id="rule-modal">
      <div class="modal">
        <h3 id="modal-title">Add Rule</h3>
        <div class="form-group">
          <label for="rule-keyword">Keyword / Phrase</label>
          <input type="text" id="rule-keyword" placeholder="e.g. work authorization" />
        </div>
        <div class="form-group">
          <label for="rule-value">Response / Value</label>
          <input type="text" id="rule-value" placeholder="e.g. Yes, I am authorized to work" />
        </div>
        <div class="form-group">
          <label for="rule-match">Match type</label>
          <select id="rule-match">
            <option value="contains">Contains keyword</option>
            <option value="exact">Exact match</option>
            <option value="startsWith">Starts with keyword</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-primary" id="modal-save">Save Rule</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Fill Button (always visible) -->
  <div class="fill-bar">
    <button class="btn-fill" id="fill-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Fill Fields on This Page
    </button>
    <div id="fill-status" class="fill-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
